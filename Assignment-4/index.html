<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jon Daniel Portfolio</title>
 
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cause:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
    rel="stylesheet"/>

</head>

<body>

    <aside>

        <h4>Podcast</h4>
        <h4>Portfolio</h4>
        <h4>Research</h4>
        <h4>Clients</h4>

    </aside>
 
    <main>

        <span class="about-me">
            <i class="ri-information-2-line"></i>
            About me
        </span>

        <div class="card">

            <div class="photo">
                <div class="white-border">
                    <div class="pink-bg">
                        <img
                        class="jon-photo"
                        src="./assets/jon-photo.png"
                        alt="jon-photo">

                    </div>

                </div>

            </div>

            <div class="black-circle"></div>
            <div class="detailes">

                <h2>
                    <span class="im">I'm,</span>
                    <br>
                    <span class="name">
                        Jon
                        <br>
                        Daniel
                    </span>
                </h2>

                <div class="mail">

                    inquiry@jondaniel.design

                    <i class="ri-mail-send-line"></i>

                </div>

            </div>

        </div>

    </main>

    <section>

        <header>

            <h1>Portfolio</h1>

            <i class="ri-arrow-up-s-line"></i>

        </header>

        <div class="section1">

            <div class="bird-img">

                <i class="ri-arrow-up-s-line"></i>

                <div class="play-btn">

                    <i class="ri-play-fill"></i>

                </div>

            </div>

        </div>

        <div class="section2">

            <div class="blue-box">

                <i class="ri-arrow-up-s-line"></i>

                <span class="number">251</span>

                <br>

                <span class="det">Projects</span>

            </div>

            <div class="purple-box">

                <i class="ri-arrow-up-s-line"></i>

                <span class="number">156</span>

                <br>

                <span class="det">Awards</span>

            </div>

        </div>

        <div class="section3">

            <i class="ri-arrow-up-s-line"></i>

            <i class="ri-apple-fill"></i>

            <span class="det">Clients</span>

        </div>

        <div class="section4">

            <div class="black-box">

                <div class="left-part">

                    <div class="ball-img"></div>

                </div>

                <div class="yellow-box">

                    <i class="ri-arrow-up-s-line"></i>

                    <span class="number">172</span>

                    <span class="det">

                        Global Design

                        <br>

                        Awards

                    </span>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
